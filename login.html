<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RobuxStore</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="noise-overlay"></div>

    <nav class="navbar">
        <div class="nav-content">
            <a href="index.html" class="logo">ROBUX<span class="logo-accent">STORE</span></a>
        </div>
    </nav>

    <section class="auth-section">
        <div class="container">
            <div class="auth-container">
                <!-- Login Form -->
                <div class="auth-card" id="loginCard">
                    <h2 class="auth-title" data-testid="login-title">Login</h2>
                    <p class="auth-subtitle">Masuk ke akun Anda</p>
                    
                    <form id="loginForm" data-testid="login-form">
                        <div class="form-group">
                            <label for="loginEmail">Email</label>
                            <input type="email" id="loginEmail" data-testid="login-email" required placeholder="nama@email.com">
                        </div>
                        <div class="form-group">
                            <label for="loginPassword">Password</label>
                            <input type="password" id="loginPassword" data-testid="login-password" required placeholder="Min. 6 karakter">
                        </div>
                        <div class="error-message" id="loginError"></div>
                        <button type="submit" class="btn-primary" data-testid="login-submit-btn">Login</button>
                    </form>
                    
                    <p class="auth-switch">Belum punya akun? <a href="#" onclick="showRegister(); return false;">Register</a></p>
                </div>

                <!-- Register Form -->
                <div class="auth-card" id="registerCard" style="display: none;">
                    <h2 class="auth-title" data-testid="register-title">Register</h2>
                    <p class="auth-subtitle">Buat akun baru</p>
                    
                    <form id="registerForm" data-testid="register-form">
                        <div class="form-group">
                            <label for="registerName">Nama</label>
                            <input type="text" id="registerName" data-testid="register-name" required placeholder="Nama lengkap">
                        </div>
                        <div class="form-group">
                            <label for="registerEmail">Email</label>
                            <input type="email" id="registerEmail" data-testid="register-email" required placeholder="nama@email.com">
                        </div>
                        <div class="form-group">
                            <label for="registerPassword">Password</label>
                            <input type="password" id="registerPassword" data-testid="register-password" required placeholder="Min. 6 karakter">
                        </div>
                        <div class="error-message" id="registerError"></div>
                        <button type="submit" class="btn-primary" data-testid="register-submit-btn">Register</button>
                    </form>
                    
                    <p class="auth-switch">Sudah punya akun? <a href="#" onclick="showLogin(); return false;">Login</a></p>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', handleLogin);
        document.getElementById('registerForm').addEventListener('submit', handleRegister);

        function showRegister() {
            document.getElementById('loginCard').style.display = 'none';
            document.getElementById('registerCard').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('registerCard').style.display = 'none';
            document.getElementById('loginCard').style.display = 'block';
        }
    </script>
</body>
</html>
